<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امتحان توفاس</title>
<style>
  body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at top, #1a0033, #05000a 60%);
  color: #eaeaff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.quiz-box {
  background: linear-gradient(145deg, #0b001a, #140033);
  padding: 22px;
  border-radius: 16px;
  width: 100%;
  max-width: 430px;
  text-align: center;
  box-shadow:
    0 0 20px rgba(138, 43, 226, 0.4),
    inset 0 0 15px rgba(0, 0, 0, 0.8);
  border: 1px solid rgba(180, 120, 255, 0.3);
}

.title {
  font-size: 28px;
  font-weight: 900;
  color: #b388ff;
  text-shadow: 0 0 8px rgba(180, 120, 255, 0.9);
  margin-bottom: 8px;
}

.authors {
  font-size: 18px;
  font-weight: bold;
  color: #7df9ff;
  display: flex;
  justify-content: center;
  gap: 8px;
  text-shadow: 0 0 6px rgba(0, 255, 255, 0.6);
}

#timer {
  background: rgba(0, 0, 0, 0.6);
  padding: 8px;
  border-radius: 10px;
  margin: 12px 0;
  font-size: 18px;
  color: #ff6bff;
  box-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
}

input {
  width: 92%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #7a3cff;
  font-size: 16px;
  background: #0b001a;
  color: #fff;
  box-shadow: inset 0 0 8px rgba(122, 60, 255, 0.5);
}

input::placeholder {
  color: #aaa;
}

button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  background: linear-gradient(135deg, #6a00ff, #b100ff);
  color: #fff;
  font-weight: bold;
  box-shadow: 0 0 12px rgba(177, 0, 255, 0.6);
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 18px rgba(177, 0, 255, 0.9);
}

.correct {
  background: linear-gradient(135deg, #00ff9d, #00c97a);
  color: #000;
  box-shadow: 0 0 15px rgba(0, 255, 157, 0.9);
}

.wrong {
  background: linear-gradient(135deg, #ff003c, #ff4d6d);
  color: #000;
  box-shadow: 0 0 15px rgba(255, 0, 60, 0.9);
}

#next {
  background: linear-gradient(135deg, #00c3ff, #7a3cff);
  color: #fff;
  display: none;
}

#start {
  background: linear-gradient(135deg, #7a3cff, #ff00ff);
}

pre {
  text-align: left;
  background: rgba(0, 0, 0, 0.7);
  padding: 10px;
  border-radius: 10px;
  overflow-x: auto;
  box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.9);
  color: #7df9ff;
}
</style>
</head>

<body>

<div class="quiz-box" id="box">

  <div id="header">
    <div class="title">مراجعة امتحان توفاس</div>
    <div class="authors">
      <span>عمرو الحديدي</span>
      <span>&</span>
      <span>عمرو سلامه</span>
    </div>
    <hr>
  </div>

  <div id="startBox">
    <h2>اسم الطالب</h2>
    <input type="text" id="studentName" placeholder="اكتب اسمك">
    <button id="start" onclick="startQuiz()">ابدأ الامتحان</button>
  </div>

  <div id="quizBox" style="display:none">
    <div id="timer">الوقت المتبقي: 40:00</div>
    <h2 id="question"></h2>
    <div id="answers"></div>
    <button id="next" onclick="nextQuestion()">التالي</button>
  </div>

</div>

    ]
},
  {
      q:'p وسم فقرات',
      a:[

    },

      q:`يستخدم لعمل قائمه منقطه ul
      `,

    {text:'correct',correct:false}
  ]
  },
  {
    q:`num صرح عن المتغير  
      <pre><code>
      واسند اليه 85 </code></pre>`,
    a:[

      {text:'let "num"="85',correct:false},
      {text:'console.log("num = 85");',correct:false}
    ]
  },
  {
    q:`ينشئ الكود التالي
    <pre><code>
    function split5(total)
    </pre></code>`,
    a:[
      {text:'total و وسيط باسم split5 داله باسم ',correct:true},
      {text:'total قيمته  split5 متغير باسم',correct:false},
      {text:'split5 يطبع',correct:false},
      {text:'total يطبع',correct:false}
    ]
  },
   {
     q:`الكود التالي يجعل
     <pre><code>
     h1 {
  color: blue;
        }
        </pre></code>`,
        a:[
        {text:'العنوان ازرق',correct:true},
        {text:'الفقره زرقاء',correct:false},
        {text:'خلفيه زرقاء',correct:false},

        ]
   }
];

let adminMode = false;
let index = 0;
let score = 0;
let student = "";
let time = 2400;
let timerInterval;
let startTime;

shuffleArray(quiz);
function shuffleArray(arr){
  for(let i = arr.length - 1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

  function startQuiz(){
  const name = document.getElementById("studentName").value.trim();
  if(name === ""){
    alert("اكتب اسمك");
    return;
  }

  student = name;
  startTime = Date.now();

  adminMode = name.toLowerCase() === "admin";

  document.getElementById("startBox").style.display = "none";
  document.getElementById("quizBox").style.display = "block";

  startTimer();
  showQuestion();

  if(adminMode){
    autoSolve();
  }
}

function startTimer(){
  timerInterval = setInterval(()=>{
    time--;
    updateTimer();
    if(time <= 0){
      clearInterval(timerInterval);
      endQuiz(true);
    }
  },1000);
}

function updateTimer(){
  let m = Math.floor(time / 60);
  let s = time % 60;
  if(s < 10) s = "0" + s;
  document.getElementById("timer").innerText = `الوقت المتبقي: ${m}:${s}`;
}

function showQuestion(){
  document.getElementById("answers").innerHTML = "";
  document.getElementById("question").innerHTML = quiz[index].q;
  document.getElementById("next").style.display = "none";

  shuffleArray(quiz[index].a);

  quiz[index].a.forEach(ans=>{
    let btn = document.createElement("button");
    btn.innerText = ans.text;
    btn.onclick = ()=>selectAnswer(btn, ans.correct);
    document.getElementById("answers").appendChild(btn);
  });
}

function selectAnswer(btn, correct){
  let buttons = document.querySelectorAll("#answers button");
  buttons.forEach(b=>b.disabled=true);

  if(correct){
    btn.classList.add("correct");
    score++;
  }else{
    btn.classList.add("wrong");
  }

  buttons.forEach(b=>{
    if(b.innerText === quiz[index].a.find(x=>x.correct).text){
      b.classList.add("correct");
    }
  });

  document.getElementById("next").style.display="block";
}

function nextQuestion(){
  index++;
  if(index < quiz.length){
    showQuestion();
  }else{
    clearInterval(timerInterval);
    endQuiz(false);
  }
}

function endQuiz(timeout){
  let used = Math.floor((Date.now() - startTime) / 1000);
  let m = Math.floor(used / 60);
  let s = used % 60;

  let pass = score >= Math.ceil(quiz.length / 2) ? "ناجح" : "راسب";
  let color = pass === "ناجح" ? "#2ecc71" : "#e74c3c";

  document.getElementById("box").innerHTML = `
    <h2>${timeout ? "انتهى الوقت" : "انتهى الامتحان"}</h2>
    <p>اسم الطالب: <b>${student}</b></p>
    <p>النتيجة: ${score} من ${quiz.length}</p>
    <p>الوقت المستغرق: ${m} دقيقة و ${s} ثانية</p>
    <h3 style="color:${color}">${pass}</h3>
  `;
}
function autoSolve(){
  let solveInterval = setInterval(()=>{
    let correctAnswer = quiz[index].a.find(x => x.correct);
    let buttons = document.querySelectorAll("#answers button");

    buttons.forEach(btn=>{
      // استخدمنا trim() عشان نتجنب أي فراغات أو مشاكل في النصوص الكبيرة
      if(btn.innerText.trim() === correctAnswer.text.trim()){
        btn.click();
      }
    });

    setTimeout(()=>{
      if(index < quiz.length - 1){
        nextQuestion();
      }else{
        clearInterval(solveInterval);
      }
    }, 600);

  }, 1200);
} 
</script>
